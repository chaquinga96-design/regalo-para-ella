<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebulosa de los Recuerdos ✨</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 30px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 14px;
        }
        #mensaje {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 5, 30, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            padding: 25px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 192, 203, 0.6);
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.5);
            text-align: center;
            min-width: 300px;
            max-width: 80%;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
            font-size: 1.2rem;
            line-height: 1.6;
            border-left: 5px solid hotpink;
            pointer-events: auto;
        }
        #mensaje.visible {
            opacity: 1;
        }
        #mensaje img {
            max-width: 300px;
            max-height: 300px;
            border-radius: 15px;
            margin-top: 10px;
            border: 3px solid white;
            cursor: pointer;
        }
        #mensaje video {
            max-width: 300px;
            max-height: 300px;
            border-radius: 15px;
            margin-top: 10px;
            border: 3px solid white;
            background: black;
            cursor: pointer;
        }
        #cerrar-mensaje {
            position: absolute;
            top: 10px;
            right: 15px;
            color: white;
            font-size: 24px;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            z-index: 1001;
        }
        #cerrar-mensaje:hover {
            background: rgba(255,255,255,0.4);
        }
        .subtitulo {
            position: absolute;
            bottom: 10px;
            right: 20px;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            z-index: 10;
        }
        #zoom-indicator {
            position: absolute;
            bottom: 80px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 10;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,215,0,0.5);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
        
        /* Reproductor de música */
        #music-player {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(20, 5, 30, 0.85);
            backdrop-filter: blur(10px);
            color: white;
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 192, 203, 0.6);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.3);
            z-index: 100;
            width: 280px;
            pointer-events: auto;
        }
        #music-player .title {
            font-size: 16px;
            margin-bottom: 10px;
            text-align: center;
            color: #ff99cc;
            font-weight: bold;
        }
        #music-player .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        #music-player button {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        #music-player button:hover {
            background: rgba(255,105,180,0.5);
            border-color: hotpink;
            transform: scale(1.1);
        }
        #music-player .song-info {
            font-size: 14px;
            text-align: center;
            margin-bottom: 8px;
            color: #ffccff;
        }
        #music-player .progress {
            width: 100%;
            height: 5px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            margin-bottom: 5px;
            cursor: pointer;
        }
        #music-player .progress-bar {
            width: 0%;
            height: 100%;
            background: hotpink;
            border-radius: 5px;
            transition: width 0.1s linear;
        }
        #music-player .time {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #aaa;
        }
        #music-player .volume {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 8px;
        }
        #music-player .volume-slider {
            flex: 1;
            height: 5px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            cursor: pointer;
        }
        #music-player .volume-bar {
            width: 70%;
            height: 100%;
            background: hotpink;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="info">✨ Nebulosa de los Recuerdos | Para ti ✨</div>
    <div id="zoom-indicator">⭐ LAS ESTRELLAS SON TUS FOTOS - HAZ ZOOM ⭐</div>
    
    <!-- Reproductor de música -->
    <div id="music-player">
        <div class="title">🎵 Música de fondo</div>
        <div class="song-info" id="current-song">Canción 1 de 3</div>
        <div class="controls">
            <button id="prev-song" title="Anterior">⏮</button>
            <button id="play-pause" title="Reproducir/Pausa">▶</button>
            <button id="next-song" title="Siguiente">⏭</button>
        </div>
        <div class="progress" id="progress-bar">
            <div class="progress-bar" id="progress-fill"></div>
        </div>
        <div class="time">
            <span id="current-time">0:00</span>
            <span id="total-time">0:00</span>
        </div>
        <div class="volume">
            <span>🔊</span>
            <div class="volume-slider" id="volume-slider">
                <div class="volume-bar" id="volume-bar" style="width:70%"></div>
            </div>
        </div>
    </div>
    
    <div id="mensaje"></div>
    <div class="subtitulo">Con todo mi cariño 💫</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // --- REPRODUCTOR DE MÚSICA ---
        const songs = [
            'cancion1.mp3',
            'cancion2.mp3',
            'cancion3.mp3',
            'cancion4.mp3',
            'cancion5.mp3',
            'cancion6.mp3',
            'cancion7.mp3',
            'cancion8.mp3',
            'cancion9.mp3',
            'cancion10.mp3'
        ];
        
        let currentSongIndex = 0;
        let isPlaying = false;
        const audio = new Audio();
        audio.loop = false; // Nosotros manejamos el bucle manualmente
        
        function loadSong(index) {
            audio.src = songs[index];
            audio.load();
            document.getElementById('current-song').textContent = `Canción ${index + 1} de 3`;
            if (isPlaying) {
                audio.play();
            }
        }
        
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
        
        // Event listeners para el reproductor
        audio.addEventListener('timeupdate', () => {
            const progress = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
            document.getElementById('current-time').textContent = formatTime(audio.currentTime);
            document.getElementById('total-time').textContent = formatTime(audio.duration);
        });
        
        audio.addEventListener('ended', () => {
            // Pasar a la siguiente canción automáticamente
            currentSongIndex = (currentSongIndex + 1) % songs.length;
            loadSong(currentSongIndex);
        });
        
        // Controles del reproductor
        document.getElementById('play-pause').addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                document.getElementById('play-pause').textContent = '▶';
            } else {
                if (!audio.src) loadSong(0);
                audio.play();
                document.getElementById('play-pause').textContent = '⏸';
            }
            isPlaying = !isPlaying;
        });
        
        document.getElementById('next-song').addEventListener('click', () => {
            currentSongIndex = (currentSongIndex + 1) % songs.length;
            loadSong(currentSongIndex);
            if (isPlaying) audio.play();
        });
        
        document.getElementById('prev-song').addEventListener('click', () => {
            currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
            loadSong(currentSongIndex);
            if (isPlaying) audio.play();
        });
        
        document.getElementById('progress-bar').addEventListener('click', (e) => {
            const rect = e.target.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const width = rect.width;
            const percentage = x / width;
            audio.currentTime = percentage * audio.duration;
        });
        
        document.getElementById('volume-slider').addEventListener('click', (e) => {
            const rect = e.target.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const width = rect.width;
            const percentage = x / width;
            audio.volume = percentage;
            document.getElementById('volume-bar').style.width = (percentage * 100) + '%';
        });
        
        // Cargar primera canción
        loadSong(0);
        
        // --- CONFIGURACIÓN 3D ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 22);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.35;
        controls.enableZoom = true;
        controls.maxDistance = 35;
        controls.minDistance = 5;
        controls.enablePan = false;
        controls.target.set(0, 0, 0);
        
        // --- LUCES (solo afectan a nebulosas, NO a imágenes) ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        // Luces de colores para ambiente
        const light1 = new THREE.PointLight(0xff4da6, 0.8, 30);
        light1.position.set(6, 4, 6);
        scene.add(light1);
        
        const light2 = new THREE.PointLight(0x4da6ff, 0.8, 30);
        light2.position.set(-6, -3, 6);
        scene.add(light2);
        
        const light3 = new THREE.PointLight(0xaa88ff, 0.8, 30);
        light3.position.set(4, 5, -6);
        scene.add(light3);
        
        // --- PARTÍCULAS DE FONDO (con brillo) ---
        const particleCount = 5000;
        const particlesGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        
        const color = new THREE.Color();
        
        for (let i = 0; i < particleCount; i++) {
            const radius = 12 + Math.random() * 10;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            
            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.sin(phi) * Math.sin(theta) * 0.5;
            const z = radius * Math.cos(phi);
            
            positions[i*3] = x;
            positions[i*3+1] = y;
            positions[i*3+2] = z;
            
            const hue = 0.7 + Math.random() * 0.4;
            color.setHSL(hue % 1.0, 0.8, 0.5 + Math.random() * 0.3);
            
            colors[i*3] = color.r;
            colors[i*3+1] = color.g;
            colors[i*3+2] = color.b;
        }
        
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particlesGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        
        const particlesMat = new THREE.PointsMaterial({
            size: 0.12,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            transparent: true,
            depthWrite: false,
            sizeAttenuation: true
        });
        
        const particles = new THREE.Points(particlesGeo, particlesMat);
        scene.add(particles);
        
        // Estrellas de fondo (blancas) con brillo
        const starsGeo = new THREE.BufferGeometry();
        const starsPos = new Float32Array(1500 * 3);
        for (let i = 0; i < 1500; i++) {
            const r = 20 + Math.random() * 15;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            starsPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
            starsPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            starsPos[i*3+2] = r * Math.cos(phi);
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
        const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.06, sizeAttenuation: true, blending: THREE.AdditiveBlending });
        const stars = new THREE.Points(starsGeo, starsMat);
        scene.add(stars);
        
        // ===== FUNCIÓN PARA GENERAR POSICIONES DISTRIBUIDAS UNIFORMEMENTE =====
        function generarPosiciones(cantidad, radioMin, radioMax, excluir = []) {
            const posiciones = [];
            const intentosMax = 1000;
            
            for (let i = 0; i < cantidad; i++) {
                let intentos = 0;
                let valida = false;
                let nuevaPos;
                
                while (!valida && intentos < intentosMax) {
                    // Generar posición en esfera
                    const u = Math.random();
                    const v = Math.random();
                    const w = Math.random();
                    
                    const theta = 2 * Math.PI * u;
                    const phi = Math.acos(2 * v - 1);
                    const r = radioMin + Math.random() * (radioMax - radioMin);
                    
                    const x = r * Math.sin(phi) * Math.cos(theta);
                    const y = r * Math.sin(phi) * Math.sin(theta) * 0.6;
                    const z = r * Math.cos(phi);
                    
                    nuevaPos = [x, y, z];
                    
                    // Verificar distancia con posiciones existentes
                    valida = true;
                    for (let j = 0; j < posiciones.length; j++) {
                        const dx = nuevaPos[0] - posiciones[j][0];
                        const dy = nuevaPos[1] - posiciones[j][1];
                        const dz = nuevaPos[2] - posiciones[j][2];
                        const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
                        
                        if (dist < 3.0) { // Distancia mínima entre objetos
                            valida = false;
                            break;
                        }
                    }
                    
                    // Verificar distancia con posiciones excluidas
                    if (valida) {
                        for (let j = 0; j < excluir.length; j++) {
                            const dx = nuevaPos[0] - excluir[j][0];
                            const dy = nuevaPos[1] - excluir[j][1];
                            const dz = nuevaPos[2] - excluir[j][2];
                            const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
                            
                            if (dist < 3.0) {
                                valida = false;
                                break;
                            }
                        }
                    }
                    
                    intentos++;
                }
                
                if (valida) {
                    posiciones.push(nuevaPos);
                } else {
                    // Si no encontramos posición válida, poner en el borde
                    const theta = 2 * Math.PI * Math.random();
                    const phi = Math.acos(2 * Math.random() - 1);
                    const r = radioMax - 1;
                    const x = r * Math.sin(phi) * Math.cos(theta);
                    const y = r * Math.sin(phi) * Math.sin(theta) * 0.6;
                    const z = r * Math.cos(phi);
                    posiciones.push([x, y, z]);
                }
            }
            
            return posiciones;
        }
        
        // ===== GENERAR POSICIONES PARA NEBULOSAS =====
        const numNebulosas = 11; // 5 textos + 6 imágenes
        const posicionesNebulosas = generarPosiciones(numNebulosas, 6, 9);
        
        // ===== NEBULOSAS (con brillo) =====
        const textos = [
            '✨ Gracias por todas las sonrisas. Espero que tengas un lindo cumpleaños ✨',
            '💫 Que la vida te mime tanto como tú mereces 💫',
            '❤️ Tu risa es lo que más extraño ❤️',
            '🌌 Eres mi persona favorita en el universo 🌌',
            'No te alejes por favor.'
        ];
        
        const imagenesNebulosas = [
            { archivo: 'foto1.JPEG', texto: 'Nuestra primera salida de pareja' },
            { archivo: 'foto2.jpg', texto: '¡Feliz día!' },
            { archivo: 'foto3.jpg', texto: 'Brilla hoy como nunca, es tu día' },
            { archivo: 'foto4.jpg', texto: 'Que nunca te falten ganas de vivir, de reír y de seguir siendo tú. ¡Feliz cumpleaños!' },
            { archivo: 'foto5.jpg', texto: 'Feliz cumpleaños sinceramente, deseo con todo mi corazón que tu vida siga floreciendo y sigas avanzando. Recuerda que siempre estaré a tu lado. ¡Felicidades!' },
            { archivo: 'foto6.jpg', texto: 'Deseo que a pesar del paso de los años continúes teniendo esa alegría, encanto y bondad que te caracterizan.' }
        ];
        
        const coloresNebulosas = [
            0xff66b2, 0x66b2ff, 0xcc66ff, 0xffaa88, 0xff66cc,
            0xffaa88, 0x88aaff, 0xff88aa, 0xff66cc, 0xff66cc, 0xff66cc
        ];
        
        const esferas = [];
        
        // Textos (primeras 5)
        for (let i = 0; i < 5; i++) {
            const pos = posicionesNebulosas[i];
            const geometry = new THREE.SphereGeometry(0.65, 32, 32);
            const material = new THREE.MeshStandardMaterial({
                color: coloresNebulosas[i],
                emissive: coloresNebulosas[i],
                emissiveIntensity: 0.4,
                roughness: 0.3,
                metalness: 0.1
            });
            
            const esfera = new THREE.Mesh(geometry, material);
            esfera.position.set(pos[0], pos[1], pos[2]);
            
            esfera.userData = {
                tipo: 'texto',
                contenido: textos[i]
            };
            
            scene.add(esfera);
            esferas.push(esfera);
            
            const pointLight = new THREE.PointLight(coloresNebulosas[i], 0.6, 7);
            pointLight.position.set(pos[0], pos[1], pos[2]);
            scene.add(pointLight);
        }
        
        // Imágenes de nebulosas (siguientes 6)
        for (let i = 0; i < 6; i++) {
            const pos = posicionesNebulosas[i + 5];
            const geometry = new THREE.SphereGeometry(0.65, 32, 32);
            const material = new THREE.MeshStandardMaterial({
                color: coloresNebulosas[i + 5],
                emissive: coloresNebulosas[i + 5],
                emissiveIntensity: 0.4,
                roughness: 0.3,
                metalness: 0.1
            });
            
            const esfera = new THREE.Mesh(geometry, material);
            esfera.position.set(pos[0], pos[1], pos[2]);
            
            esfera.userData = {
                tipo: 'imagen',
                contenido: imagenesNebulosas[i].archivo,
                textoAlternativo: imagenesNebulosas[i].texto
            };
            
            scene.add(esfera);
            esferas.push(esfera);
            
            const pointLight = new THREE.PointLight(coloresNebulosas[i + 5], 0.6, 7);
            pointLight.position.set(pos[0], pos[1], pos[2]);
            scene.add(pointLight);
        }
        
        // ===== GENERAR POSICIONES PARA ESTRELLAS MÁGICAS (IMÁGENES SIN BRILLO) =====
        // Usamos las posiciones de nebulosas como exclusión
        const posicionesNebulosasArray = posicionesNebulosas.map(p => [p[0], p[1], p[2]]);
        const posicionesEstrellas = generarPosiciones(14, 8, 12, posicionesNebulosasArray);
        
        const estrellasMagicas = [
            'foto7.jpg', 'foto8.jpg', 'foto9.jpg', 'foto10.jpg',
            'foto11.jpg', 'foto12.jpg', 'foto13.jpg', 'foto14.jpg',
            'foto15.jpg', 'foto16.jpg', 'foto17.jpg', 'foto18.jpg',
            'foto19.jpg', 'foto20.jpg'
        ];
        
        const textureLoader = new THREE.TextureLoader();
        
        estrellasMagicas.forEach((archivo, index) => {
            textureLoader.load(
                archivo,
                (texture) => {
                    // Material SIN NINGÚN BRILLO - solo la imagen pura
                    const material = new THREE.SpriteMaterial({ 
                        map: texture,
                        transparent: false,
                        blending: THREE.NormalBlending, // Modo normal, sin brillo
                        depthTest: true,
                        depthWrite: true,
                        sizeAttenuation: true,
                        color: 0xffffff // Color blanco puro
                    });
                    
                    const sprite = new THREE.Sprite(material);
                    const pos = posicionesEstrellas[index];
                    sprite.position.set(pos[0], pos[1], pos[2]);
                    sprite.scale.set(2.3, 2.3, 1);
                    
                    scene.add(sprite);
                    console.log(`✅ Imagen cargada: ${archivo}`);
                },
                undefined,
                (err) => {
                    console.warn(`❌ Error cargando: ${archivo}`);
                }
            );
        });
        
        // ===== VIDEOS (SIN SONIDO) =====
        const posicionesVideos = generarPosiciones(6, 9, 13, [...posicionesNebulosasArray, ...posicionesEstrellas]);
        
        const videosInfo = [
            { archivo: 'video1.MP4', texto: '🎬 Tal vez no pueda estar a tu lado en este momento pero espero algun día poder estarlo, felicidades y espero que sea un dia maravillos para ti.', color: 0xffaa66 },
            { archivo: 'video2.mp4', texto: '🎬 Doy gracias cada día por haberte conocido y pido perdon por haberte fallado.', color: 0xff66cc },
            { archivo: 'video3.mp4', texto: '🎬 El universo está de fiesta', color: 0x66ffcc },
            { archivo: 'video4.mp4', texto: '🎬 Te pienso en tu día', color: 0xcc66ff },
            { archivo: 'video5.mp4', texto: '🎬 No dejes de brillar', color: 0xffaa88 },
            { archivo: 'video6.mp4', texto: '🎬 Tu luz interior', color: 0x88aaff }
        ];
        
        const objetosMagicos = [];
        
        videosInfo.forEach((video, index) => {
            const geometry = new THREE.SphereGeometry(0.7, 24, 24);
            const material = new THREE.MeshStandardMaterial({
                color: video.color,
                emissive: video.color,
                emissiveIntensity: 0.5,
                roughness: 0.3,
                metalness: 0.1
            });
            const esferaVideo = new THREE.Mesh(geometry, material);
            const pos = posicionesVideos[index];
            esferaVideo.position.set(pos[0], pos[1], pos[2]);
            
            esferaVideo.userData = {
                tipo: 'video',
                archivo: video.archivo,
                texto: video.texto,
                esMagico: true
            };
            
            scene.add(esferaVideo);
            objetosMagicos.push(esferaVideo);
            
            const pointLight = new THREE.PointLight(video.color, 0.6, 7);
            pointLight.position.set(pos[0], pos[1], pos[2]);
            scene.add(pointLight);
        });
        
        // --- RAYCASTER PARA CLICS ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let videoActual = null;
        
        function detenerVideoActual() {
            if (videoActual) {
                videoActual.pause();
                videoActual.currentTime = 0;
                videoActual = null;
            }
        }
        
        window.detenerVideoActual = detenerVideoActual;
        
        function onClick(event) {
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            
            const todosLosObjetosClickeables = [...esferas, ...objetosMagicos];
            const intersects = raycaster.intersectObjects(todosLosObjetosClickeables);
            
            if (intersects.length > 0) {
                const objeto = intersects[0].object;
                const datos = objeto.userData;
                const mensajeDiv = document.getElementById('mensaje');
                
                detenerVideoActual();
                
                let contenidoHTML = '';
                contenidoHTML += '<div id="cerrar-mensaje" onclick="document.getElementById(\'mensaje\').classList.remove(\'visible\'); detenerVideoActual();">✕</div>';
                
                if (datos.tipo === 'video' && datos.esMagico) {
                    contenidoHTML += `<p style="margin:0; font-style:italic; margin-bottom:10px;">🎬</p>`;
                    contenidoHTML += `<p style="margin:5px 0 15px;">${datos.texto}</p>`;
                    // Video SIN SONIDO (muted)
                    contenidoHTML += `<video id="video-reproduccion" muted controls style="width:100%; max-width:300px; border-radius:15px; margin-top:10px;" src="${datos.archivo}"></video>`;
                } 
                else if (datos.tipo === 'texto') {
                    contenidoHTML += `<p style="margin:0; font-style:italic;">💬</p><p style="margin:15px 0 0;">${datos.contenido}</p>`;
                } 
                else if (datos.tipo === 'imagen') {
                    contenidoHTML += `<p style="margin-bottom:15px;">${datos.textoAlternativo}</p>`;
                    contenidoHTML += `<img src="${datos.contenido}" alt="${datos.textoAlternativo}" style="max-width:300px; max-height:300px; border-radius:15px; border:3px solid white;">`;
                }
                
                mensajeDiv.innerHTML = contenidoHTML;
                mensajeDiv.classList.add('visible');
                
                if (datos.tipo === 'video' && datos.esMagico) {
                    setTimeout(() => {
                        videoActual = document.getElementById('video-reproduccion');
                    }, 100);
                }
                
                if (objeto.material.emissiveIntensity !== undefined) {
                    objeto.material.emissiveIntensity = 1.2;
                    setTimeout(() => {
                        if (objeto.material.emissiveIntensity !== undefined) {
                            objeto.material.emissiveIntensity = 0.4;
                        }
                    }, 300);
                }
            }
        }
        
        window.addEventListener('click', onClick);
        
        // --- ANIMACIÓN ---
        function animate() {
            requestAnimationFrame(animate);
            
            particles.rotation.y += 0.0001;
            stars.rotation.y -= 0.00005;
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
