<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nebulosa de los Recuerdos ✨</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 30px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 12px;
        }
        
        #zoom-indicator {
            position: absolute;
            bottom: 100px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 10;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,215,0,0.5);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
        
        .subtitulo {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: rgba(255,255,255,0.3);
            font-size: 10px;
            z-index: 10;
        }
        
        /* REPRODUCTOR MINIMIZABLE */
        #music-player {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(20, 5, 30, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            border-radius: 30px;
            border: 1px solid rgba(255, 192, 203, 0.6);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.3);
            z-index: 100;
            pointer-events: auto;
            transition: all 0.3s ease;
            overflow: hidden;
        }
        
        #music-player.minimized {
            width: auto;
            border-radius: 40px;
        }
        
        #music-player.minimized .player-content {
            display: none;
        }
        
        #music-player.minimized .minimized-controls {
            display: flex;
        }
        
        #music-player:not(.minimized) {
            width: min(300px, calc(100% - 20px));
            max-width: 300px;
        }
        
        #music-player:not(.minimized) .player-content {
            display: block;
        }
        
        #music-player:not(.minimized) .minimized-controls {
            display: none;
        }
        
        .minimized-controls {
            display: flex;
            align-items: center;
            padding: 6px 12px;
            gap: 10px;
        }
        
        .minimized-controls button {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }
        
        .minimized-controls .now-playing {
            font-size: 13px;
            color: #ffccff;
            max-width: 120px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .toggle-player {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 101;
            touch-action: manipulation;
        }
        
        .player-content {
            padding: 20px 15px 15px 15px;
        }
        
        .player-content .title {
            font-size: 14px;
            margin-bottom: 8px;
            text-align: center;
            color: #ff99cc;
            font-weight: bold;
        }
        
        .player-content .song-info {
            font-size: 13px;
            text-align: center;
            margin-bottom: 8px;
            color: #ffccff;
        }
        
        .player-content .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        
        .player-content .controls button {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            touch-action: manipulation;
        }
        
        .player-content .progress {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 6px;
            margin-bottom: 5px;
            cursor: pointer;
        }
        
        .player-content .progress-bar {
            width: 0%;
            height: 100%;
            background: hotpink;
            border-radius: 6px;
            transition: width 0.1s linear;
        }
        
        .player-content .time {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #aaa;
            margin-bottom: 8px;
        }
        
        .player-content .volume {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .player-content .volume-slider {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 6px;
            cursor: pointer;
        }
        
        .player-content .volume-bar {
            width: 70%;
            height: 100%;
            background: hotpink;
            border-radius: 6px;
        }
        
        @media (max-width: 600px) {
            #music-player:not(.minimized) {
                width: calc(100% - 20px);
                max-width: none;
                left: 10px;
                right: 10px;
                top: 10px;
            }
            #info { top: 130px; }
            #zoom-indicator { bottom: 120px; }
        }
        
        /* MENSAJE EMERGENTE - ahora se crea y destruye dinámicamente */
        .mensaje-contenedor {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 5, 30, 0.98);
            backdrop-filter: blur(10px);
            color: white;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 192, 203, 0.6);
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.5);
            text-align: center;
            width: min(500px, calc(100% - 40px));
            max-width: 500px;
            max-height: 70vh;
            overflow-y: auto;
            z-index: 2000;
            font-size: 1rem;
            border-left: 5px solid hotpink;
            pointer-events: auto;
        }
        
        .mensaje-contenedor img, .mensaje-contenedor video {
            max-width: 100%;
            max-height: 300px;
            border-radius: 15px;
            margin-top: 10px;
            border: 3px solid white;
        }
        
        .cerrar-mensaje-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            color: white;
            font-size: 24px;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2001;
            touch-action: manipulation;
        }
    </style>
</head>
<body>
    <div id="info">✨ Nebulosa de los Recuerdos | Para ti ✨</div>
    <div id="zoom-indicator">⭐ TOCA CUALQUIER LUGAR PARA ACTIVAR LA MÚSICA ⭐</div>
    
    <div id="music-player">
        <div class="toggle-player" id="toggle-player">🔽</div>
        <div class="minimized-controls">
            <button id="prev-song-mini">⏮</button>
            <button id="play-pause-mini">▶</button>
            <button id="next-song-mini">⏭</button>
            <span class="now-playing" id="now-playing-mini">Canción 1 de 10</span>
        </div>
        <div class="player-content">
            <div class="title">🎵 Música de fondo</div>
            <div class="song-info" id="current-song">Canción 1 de 10</div>
            <div class="controls">
                <button id="prev-song">⏮</button>
                <button id="play-pause">▶</button>
                <button id="next-song">⏭</button>
            </div>
            <div class="progress" id="progress-bar">
                <div class="progress-bar" id="progress-fill"></div>
            </div>
            <div class="time">
                <span id="current-time">0:00</span>
                <span id="total-time">0:00</span>
            </div>
            <div class="volume">
                <span>🔊</span>
                <div class="volume-slider" id="volume-slider">
                    <div class="volume-bar" id="volume-bar" style="width:70%"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="subtitulo">Con todo mi cariño 💫</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // --- CONFIGURACIÓN BÁSICA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 22);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.3;
        controls.maxDistance = 35;
        controls.minDistance = 5;
        controls.enablePan = false;
        controls.target.set(0, 0, 0);
        
        // --- LUCES ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const light1 = new THREE.PointLight(0xff4da6, 0.6, 30);
        light1.position.set(6, 4, 6);
        scene.add(light1);
        
        const light2 = new THREE.PointLight(0x4da6ff, 0.6, 30);
        light2.position.set(-6, -3, 6);
        scene.add(light2);
        
        const light3 = new THREE.PointLight(0xaa88ff, 0.6, 30);
        light3.position.set(4, 5, -6);
        scene.add(light3);
        
        // --- PARTÍCULAS ---
        const particleCount = 3000;
        const particlesGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const color = new THREE.Color();
        
        for (let i = 0; i < particleCount; i++) {
            const r = 12 + Math.random() * 10;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            
            positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
            positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta) * 0.5;
            positions[i*3+2] = r * Math.cos(phi);
            
            color.setHSL(0.7 + Math.random() * 0.4, 0.8, 0.5 + Math.random() * 0.3);
            colors[i*3] = color.r;
            colors[i*3+1] = color.g;
            colors[i*3+2] = color.b;
        }
        
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particlesGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        
        const particlesMat = new THREE.PointsMaterial({
            size: 0.1,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            transparent: true,
            sizeAttenuation: true
        });
        
        const particles = new THREE.Points(particlesGeo, particlesMat);
        scene.add(particles);
        
        // Estrellas de fondo
        const starsGeo = new THREE.BufferGeometry();
        const starsPos = new Float32Array(1000 * 3);
        for (let i = 0; i < 1000; i++) {
            const r = 20 + Math.random() * 15;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            starsPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
            starsPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            starsPos[i*3+2] = r * Math.cos(phi);
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
        const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05, blending: THREE.AdditiveBlending });
        const stars = new THREE.Points(starsGeo, starsMat);
        scene.add(stars);
        
        // --- FUNCIÓN PARA GENERAR POSICIONES ---
        function generarPosiciones(cantidad, radioMin, radioMax) {
            const posiciones = [];
            for (let i = 0; i < cantidad; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = radioMin + Math.random() * (radioMax - radioMin);
                posiciones.push([
                    r * Math.sin(phi) * Math.cos(theta),
                    r * Math.sin(phi) * Math.sin(theta) * 0.6,
                    r * Math.cos(phi)
                ]);
            }
            return posiciones;
        }
        
        // --- CREAR NEBULOSAS ---
        const esferas = [];
        const posNeb = generarPosiciones(11, 6, 9);
        
        const textos = [
            '✨ Gracias por todas las sonrisas. Espero que tengas un lindo cumpleaños ✨',
            '💫 Que la vida te mime tanto como tú mereces 💫',
            '❤️ Tu risa es lo que más extraño ❤️',
            '🌌 Eres mi persona favorita en el universo 🌌',
            'No te alejes por favor.'
        ];
        
        const imagenesNeb = [
            { archivo: 'foto1.JPEG', texto: 'Nuestra primera salida de pareja' },
            { archivo: 'foto2.jpg', texto: '¡Feliz día!' },
            { archivo: 'foto3.jpg', texto: 'Brilla hoy como nunca, es tu día' },
            { archivo: 'foto4.jpg', texto: 'Que nunca te falten ganas de vivir, de reír y de seguir siendo tú. ¡Feliz cumpleaños!' },
            { archivo: 'foto5.jpg', texto: 'Feliz cumpleaños sinceramente, deseo con todo mi corazón que tu vida siga floreciendo y sigas avanzando. Recuerda que siempre estaré a tu lado. ¡Felicidades!' },
            { archivo: 'foto6.jpg', texto: 'Deseo que a pesar del paso de los años continúes teniendo esa alegría, encanto y bondad que te caracterizan.' }
        ];
        
        const colores = [
            0xff66b2, 0x66b2ff, 0xcc66ff, 0xffaa88, 0xff66cc,
            0xffaa88, 0x88aaff, 0xff88aa, 0xff66cc, 0xff66cc, 0xff66cc
        ];
        
        // Textos
        for (let i = 0; i < 5; i++) {
            const geometry = new THREE.SphereGeometry(0.65, 24, 24);
            const material = new THREE.MeshStandardMaterial({
                color: colores[i],
                emissive: colores[i],
                emissiveIntensity: 0.4
            });
            const esfera = new THREE.Mesh(geometry, material);
            esfera.position.set(posNeb[i][0], posNeb[i][1], posNeb[i][2]);
            esfera.userData = { tipo: 'texto', contenido: textos[i] };
            scene.add(esfera);
            esferas.push(esfera);
            
            const light = new THREE.PointLight(colores[i], 0.4, 5);
            light.position.set(posNeb[i][0], posNeb[i][1], posNeb[i][2]);
            scene.add(light);
        }
        
        // Imágenes de nebulosas
        for (let i = 0; i < 6; i++) {
            const geometry = new THREE.SphereGeometry(0.65, 24, 24);
            const material = new THREE.MeshStandardMaterial({
                color: colores[i+5],
                emissive: colores[i+5],
                emissiveIntensity: 0.4
            });
            const esfera = new THREE.Mesh(geometry, material);
            esfera.position.set(posNeb[i+5][0], posNeb[i+5][1], posNeb[i+5][2]);
            esfera.userData = {
                tipo: 'imagen',
                contenido: imagenesNeb[i].archivo,
                textoAlternativo: imagenesNeb[i].texto
            };
            scene.add(esfera);
            esferas.push(esfera);
            
            const light = new THREE.PointLight(colores[i+5], 0.4, 5);
            light.position.set(posNeb[i+5][0], posNeb[i+5][1], posNeb[i+5][2]);
            scene.add(light);
        }
        
        // --- ESTRELLAS MÁGICAS ---
        const posEstrellas = generarPosiciones(14, 8, 12);
        const archivosEstrellas = [
            'foto7.jpg', 'foto8.jpg', 'foto9.jpg', 'foto10.jpg',
            'foto11.jpg', 'foto12.jpg', 'foto13.jpg', 'foto14.jpg',
            'foto15.jpg', 'foto16.jpg', 'foto17.jpg', 'foto18.jpg',
            'foto19.jpg', 'foto20.jpg'
        ];
        
        const textureLoader = new THREE.TextureLoader();
        archivosEstrellas.forEach((archivo, i) => {
            if (i < posEstrellas.length) {
                textureLoader.load(archivo, (texture) => {
                    const material = new THREE.SpriteMaterial({ 
                        map: texture,
                        blending: THREE.NormalBlending,
                        sizeAttenuation: true
                    });
                    const sprite = new THREE.Sprite(material);
                    sprite.position.set(posEstrellas[i][0], posEstrellas[i][1], posEstrellas[i][2]);
                    sprite.scale.set(2.2, 2.2, 1);
                    scene.add(sprite);
                });
            }
        });
        
        // --- VIDEOS (TODOS MUTEADOS) ---
        const objetosMagicos = [];
        const posVideos = generarPosiciones(6, 9, 13);
        const videosInfo = [
            { archivo: 'video1.MP4', texto: '🎬 El universo está de fiesta.', color: 0xffaa66 },
            { archivo: 'video2.mp4', texto: '🎬 Doy gracias cada día por haberte conocido y pido perdon por haberte fallado.', color: 0xff66cc },
            { archivo: 'video3.mp4', texto: '🎬 Tal vez no pueda estar a tu lado en este momento pero espero algun día poder estarlo, felicidades.', color: 0x66ffcc },
            { archivo: 'video4.mp4', texto: '🎬 Te pienso en tu día', color: 0xcc66ff },
            { archivo: 'video5.mp4', texto: '🎬 No dejes de brillar', color: 0xffaa88 },
            { archivo: 'video6.mp4', texto: '🎬 Tu luz interior', color: 0x88aaff }
        ];
        
        videosInfo.forEach((video, i) => {
            if (i < posVideos.length) {
                const geometry = new THREE.SphereGeometry(0.7, 16, 16);
                const material = new THREE.MeshStandardMaterial({
                    color: video.color,
                    emissive: video.color,
                    emissiveIntensity: 0.4
                });
                const esfera = new THREE.Mesh(geometry, material);
                esfera.position.set(posVideos[i][0], posVideos[i][1], posVideos[i][2]);
                esfera.userData = {
                    tipo: 'video',
                    archivo: video.archivo,
                    texto: video.texto,
                    esMagico: true
                };
                scene.add(esfera);
                objetosMagicos.push(esfera);
                
                const light = new THREE.PointLight(video.color, 0.4, 5);
                light.position.set(posVideos[i][0], posVideos[i][1], posVideos[i][2]);
                scene.add(light);
            }
        });
        
        // --- REPRODUCTOR DE MÚSICA ---
        const songs = [
            'cancion1.mp3', 'cancion2.mp3', 'cancion3.mp3', 'cancion4.mp3',
            'cancion5.mp3', 'cancion6.mp3', 'cancion7.mp3', 'cancion8.mp3',
            'cancion9.mp3', 'cancion10.mp3'
        ];
        
        let currentSongIndex = 0;
        let isPlaying = false;
        let musicaActivada = false;
        
        const audio = new Audio();
        audio.loop = false;
        
        function updateSongDisplay() {
            const text = `Canción ${currentSongIndex + 1} de ${songs.length}`;
            document.getElementById('current-song').textContent = text;
            document.getElementById('now-playing-mini').textContent = text;
        }
        
        function loadSong(index) {
            audio.src = songs[index];
            audio.load();
            updateSongDisplay();
        }
        
        function playMusic() {
            if (!musicaActivada) {
                musicaActivada = true;
                document.getElementById('zoom-indicator').textContent = '⭐ LAS ESTRELLAS SON TUS FOTOS - HAZ ZOOM ⭐';
            }
            audio.play().then(() => {
                isPlaying = true;
                document.getElementById('play-pause').textContent = '⏸';
                document.getElementById('play-pause-mini').textContent = '⏸';
            }).catch(() => {});
        }
        
        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                document.getElementById('play-pause').textContent = '▶';
                document.getElementById('play-pause-mini').textContent = '▶';
            } else {
                playMusic();
            }
            isPlaying = !isPlaying;
        }
        
        loadSong(0);
        
        // Event listeners del reproductor
        document.getElementById('play-pause').addEventListener('click', (e) => {
            e.stopPropagation();
            togglePlay();
        });
        document.getElementById('play-pause-mini').addEventListener('click', (e) => {
            e.stopPropagation();
            togglePlay();
        });
        
        document.getElementById('next-song').addEventListener('click', (e) => {
            e.stopPropagation();
            currentSongIndex = (currentSongIndex + 1) % songs.length;
            loadSong(currentSongIndex);
            if (isPlaying) playMusic();
        });
        document.getElementById('next-song-mini').addEventListener('click', (e) => {
            e.stopPropagation();
            currentSongIndex = (currentSongIndex + 1) % songs.length;
            loadSong(currentSongIndex);
            if (isPlaying) playMusic();
        });
        
        document.getElementById('prev-song').addEventListener('click', (e) => {
            e.stopPropagation();
            currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
            loadSong(currentSongIndex);
            if (isPlaying) playMusic();
        });
        document.getElementById('prev-song-mini').addEventListener('click', (e) => {
            e.stopPropagation();
            currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
            loadSong(currentSongIndex);
            if (isPlaying) playMusic();
        });
        
        document.getElementById('progress-bar').addEventListener('click', (e) => {
            e.stopPropagation();
            const rect = e.target.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const percentage = x / rect.width;
            audio.currentTime = percentage * audio.duration;
        });
        
        document.getElementById('volume-slider').addEventListener('click', (e) => {
            e.stopPropagation();
            const rect = e.target.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const percentage = Math.max(0, Math.min(1, x / rect.width));
            audio.volume = percentage;
            document.getElementById('volume-bar').style.width = (percentage * 100) + '%';
        });
        
        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const progress = (audio.currentTime / audio.duration) * 100;
                document.getElementById('progress-fill').style.width = progress + '%';
                document.getElementById('current-time').textContent = formatTime(audio.currentTime);
                document.getElementById('total-time').textContent = formatTime(audio.duration);
            }
        });
        
        audio.addEventListener('ended', () => {
            currentSongIndex = (currentSongIndex + 1) % songs.length;
            loadSong(currentSongIndex);
            if (isPlaying) playMusic();
        });
        
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
        
        // Activar música con el primer clic
        function activarMusica() {
            if (!musicaActivada) {
                playMusic();
            }
            document.removeEventListener('click', activarMusica);
            document.removeEventListener('touchstart', activarMusica);
        }
        
        document.addEventListener('click', activarMusica);
        document.addEventListener('touchstart', activarMusica);
        
        // --- MINIMIZAR/EXPANDIR REPRODUCTOR ---
        const musicPlayer = document.getElementById('music-player');
        const toggleBtn = document.getElementById('toggle-player');
        toggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            musicPlayer.classList.toggle('minimized');
            toggleBtn.textContent = musicPlayer.classList.contains('minimized') ? '⬆️' : '🔽';
        });
        
        // --- VARIABLES PARA EL MENSAJE ---
        let videoActual = null;
        let mensajeActual = null;
        
        function detenerVideoActual() {
            if (videoActual) {
                videoActual.pause();
                videoActual.currentTime = 0;
                videoActual = null;
            }
        }
        
        // Función para cerrar el mensaje (ELIMINAR del DOM)
        function cerrarMensaje() {
            if (mensajeActual) {
                mensajeActual.remove(); // Eliminar completamente del DOM
                mensajeActual = null;
            }
            detenerVideoActual();
        }
        
        // Función para crear y mostrar un mensaje
        function mostrarMensaje(datos) {
            // Cerrar mensaje anterior si existe
            cerrarMensaje();
            
            // Crear nuevo contenedor
            const contenedor = document.createElement('div');
            contenedor.className = 'mensaje-contenedor';
            
            let html = '<div class="cerrar-mensaje-btn" onclick="this.parentElement.remove(); window.detenerVideoActual && window.detenerVideoActual();">✕</div>';
            
            if (datos.tipo === 'video') {
                html += `<p style="margin:0 0 10px;">🎬</p>`;
                html += `<p style="margin:5px 0 15px;">${datos.texto}</p>`;
                html += `<video id="video-reproduccion" muted controls playsinline style="width:100%; border-radius:15px;" src="${datos.archivo}"></video>`;
            } else if (datos.tipo === 'texto') {
                html += `<p style="margin:0; font-style:italic;">💬</p><p style="margin:15px 0 0;">${datos.contenido}</p>`;
            } else if (datos.tipo === 'imagen') {
                html += `<p style="margin-bottom:15px;">${datos.textoAlternativo}</p>`;
                html += `<img src="${datos.contenido}" style="max-width:100%; border-radius:15px;">`;
            }
            
            contenedor.innerHTML = html;
            document.body.appendChild(contenedor);
            mensajeActual = contenedor;
            
            if (datos.tipo === 'video') {
                setTimeout(() => {
                    videoActual = document.getElementById('video-reproduccion');
                }, 100);
            }
        }
        
        window.detenerVideoActual = detenerVideoActual;
        
        // --- RAYCASTER ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        function handleClick(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            const clientX = event.touches ? event.touches[0].clientX : event.clientX;
            const clientY = event.touches ? event.touches[0].clientY : event.clientY;
            
            mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            
            const todosLosObjetos = [...esferas, ...objetosMagicos];
            const intersects = raycaster.intersectObjects(todosLosObjetos);
            
            if (intersects.length > 0) {
                const objeto = intersects[0].object;
                const datos = objeto.userData;
                
                mostrarMensaje(datos);
            }
        }
        
        renderer.domElement.addEventListener('click', handleClick);
        renderer.domElement.addEventListener('touchstart', handleClick);
        
        // --- ANIMACIÓN ---
        function animate() {
            requestAnimationFrame(animate);
            particles.rotation.y += 0.0001;
            stars.rotation.y -= 0.00005;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        // --- RESIZE ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
