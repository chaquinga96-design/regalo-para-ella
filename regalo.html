<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nebulosa de los Recuerdos ✨</title>
    <style>
        /* LOADER - Nuevo */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 20, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            backdrop-filter: blur(5px);
            transition: opacity 0.5s;
            pointer-events: none;
        }
        #loader.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loader-content {
            text-align: center;
            color: white;
        }
        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.2);
            border-top-color: hotpink;
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loader-text {
            font-size: 16px;
            margin: 10px 0;
        }
        .loader-subtext {
            font-size: 12px;
            opacity: 0.7;
        }
        
        /* RESET Y ESTILOS BASE */
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* ELEMENTOS FLOTANTES */
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 30px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 12px;
            max-width: calc(100% - 20px);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        #zoom-indicator {
            position: absolute;
            bottom: 100px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 10;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,215,0,0.5);
            animation: pulse 2s infinite;
            max-width: calc(100% - 20px);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
        
        .subtitulo {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: rgba(255,255,255,0.3);
            font-size: 10px;
            z-index: 10;
        }
        
        /* ===== REPRODUCTOR DE MÚSICA MINIMIZABLE ===== */
        #music-player {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(20, 5, 30, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            border-radius: 30px;
            border: 1px solid rgba(255, 192, 203, 0.6);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.3);
            z-index: 100;
            pointer-events: auto;
            transition: all 0.3s ease;
            overflow: hidden;
        }
        
        /* Modo MINIMIZADO */
        #music-player.minimized {
            width: auto;
            height: auto;
            border-radius: 40px;
            background: rgba(20, 5, 30, 0.8);
        }
        
        #music-player.minimized .player-content {
            display: none;
        }
        
        #music-player.minimized .minimized-controls {
            display: flex;
        }
        
        /* Modo EXPANDIDO */
        #music-player:not(.minimized) {
            width: min(300px, calc(100% - 20px));
            max-width: 300px;
        }
        
        #music-player:not(.minimized) .player-content {
            display: block;
        }
        
        #music-player:not(.minimized) .minimized-controls {
            display: none;
        }
        
        /* Controles cuando está minimizado */
        .minimized-controls {
            display: flex;
            align-items: center;
            padding: 6px 12px;
            gap: 10px;
        }
        
        .minimized-controls button {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        
        .minimized-controls button:active {
            background: rgba(255,105,180,0.7);
            transform: scale(0.95);
        }
        
        .minimized-controls .now-playing {
            font-size: 13px;
            color: #ffccff;
            max-width: 120px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* Botón para minimizar/expandir */
        .toggle-player {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 101;
            touch-action: manipulation;
        }
        
        .toggle-player:active {
            background: rgba(255,105,180,0.7);
        }
        
        /* Contenido expandido */
        .player-content {
            padding: 20px 15px 15px 15px;
        }
        
        .player-content .title {
            font-size: 14px;
            margin-bottom: 8px;
            text-align: center;
            color: #ff99cc;
            font-weight: bold;
        }
        
        .player-content .song-info {
            font-size: 13px;
            text-align: center;
            margin-bottom: 8px;
            color: #ffccff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .player-content .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        
        .player-content .controls button {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        
        .player-content .controls button:active {
            background: rgba(255,105,180,0.7);
            transform: scale(0.95);
        }
        
        .player-content .progress {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 6px;
            margin-bottom: 5px;
            cursor: pointer;
        }
        
        .player-content .progress-bar {
            width: 0%;
            height: 100%;
            background: hotpink;
            border-radius: 6px;
            transition: width 0.1s linear;
        }
        
        .player-content .time {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #aaa;
            margin-bottom: 8px;
        }
        
        .player-content .volume {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .player-content .volume span {
            font-size: 14px;
        }
        
        .player-content .volume-slider {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 6px;
            cursor: pointer;
        }
        
        .player-content .volume-bar {
            width: 70%;
            height: 100%;
            background: hotpink;
            border-radius: 6px;
        }
        
        /* Ajuste para móvil */
        @media (max-width: 600px) {
            #music-player:not(.minimized) {
                width: calc(100% - 20px);
                max-width: none;
                left: 10px;
                right: 10px;
                top: 10px;
            }
            
            #info {
                top: 130px;
            }
            
            #zoom-indicator {
                bottom: 120px;
            }
        }
        
        /* MENSAJE EMERGENTE */
        #mensaje {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 5, 30, 0.98);
            backdrop-filter: blur(10px);
            color: white;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 192, 203, 0.6);
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.5);
            text-align: center;
            width: min(500px, calc(100% - 40px));
            max-width: 500px;
            max-height: 70vh;
            overflow-y: auto;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s ease;
            font-size: 1rem;
            line-height: 1.5;
            border-left: 5px solid hotpink;
            pointer-events: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        #mensaje.visible {
            opacity: 1;
        }
        
        #mensaje img, #mensaje video {
            max-width: 100%;
            max-height: 300px;
            border-radius: 15px;
            margin-top: 10px;
            border: 3px solid white;
            cursor: pointer;
        }
        
        #cerrar-mensaje {
            position: absolute;
            top: 10px;
            right: 15px;
            color: white;
            font-size: 24px;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            z-index: 2001;
            touch-action: manipulation;
        }
        
        #cerrar-mensaje:active {
            background: rgba(255,105,180,0.7);
        }
    </style>
</head>
<body>
    <!-- LOADER -->
    <div id="loader">
        <div class="loader-content">
            <div class="loader-spinner"></div>
            <div class="loader-text">Cargando la galaxia...</div>
            <div class="loader-subtext">Preparando tus recuerdos ✨</div>
        </div>
    </div>

    <div id="info">✨ Nebulosa de los Recuerdos | Para ti ✨</div>
    <div id="zoom-indicator">⭐ TOCA CUALQUIER LUGAR PARA COMENZAR ⭐</div>
    
    <!-- Reproductor de música MINIMIZABLE -->
    <div id="music-player">
        <!-- Botón para minimizar/expandir -->
        <div class="toggle-player" id="toggle-player">🔽</div>
        
        <!-- Controles cuando está minimizado -->
        <div class="minimized-controls">
            <button id="prev-song-mini" title="Anterior">⏮</button>
            <button id="play-pause-mini" title="Reproducir/Pausa">▶</button>
            <button id="next-song-mini" title="Siguiente">⏭</button>
            <span class="now-playing" id="now-playing-mini">Canción 1 de 10</span>
        </div>
        
        <!-- Contenido expandido -->
        <div class="player-content">
            <div class="title">🎵 Música de fondo</div>
            <div class="song-info" id="current-song">Canción 1 de 10</div>
            <div class="controls">
                <button id="prev-song" title="Anterior">⏮</button>
                <button id="play-pause" title="Reproducir/Pausa">▶</button>
                <button id="next-song" title="Siguiente">⏭</button>
            </div>
            <div class="progress" id="progress-bar">
                <div class="progress-bar" id="progress-fill"></div>
            </div>
            <div class="time">
                <span id="current-time">0:00</span>
                <span id="total-time">0:00</span>
            </div>
            <div class="volume">
                <span>🔊</span>
                <div class="volume-slider" id="volume-slider">
                    <div class="volume-bar" id="volume-bar" style="width:70%"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="mensaje"></div>
    <div class="subtitulo">Con todo mi cariño 💫</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // ===== VARIABLES GLOBALES =====
        let scene, camera, renderer, controls;
        let particles, stars;
        const esferas = [];
        const objetosMagicos = [];
        let videoActual = null;
        let recursosCargados = 0;
        const totalRecursos = 37; // Aproximado: partículas + estrellas + nebulosas + fotos + videos
        
        // Loader
        const loader = document.getElementById('loader');
        function recursoCargado() {
            recursosCargados++;
            if (recursosCargados >= totalRecursos) {
                setTimeout(() => {
                    loader.classList.add('hidden');
                }, 800);
            }
        }
        
        // ===== REPRODUCTOR DE MÚSICA OPTIMIZADO =====
        const songs = [
            'cancion1.mp3',
            'cancion2.mp3',
            'cancion3.mp3',
            'cancion4.mp3',
            'cancion5.mp3',
            'cancion6.mp3',
            'cancion7.mp3',
            'cancion8.mp3',
            'cancion9.mp3',
            'cancion10.mp3'
        ];
        
        let currentSongIndex = 0;
        let isPlaying = false; // No intentamos autoplay aún
        let audioInicializado = false;
        const audio = new Audio();
        audio.loop = false;
        audio.volume = 0.7;
        
        // Precargar primera canción
        audio.preload = 'auto';
        audio.src = songs[0];
        audio.load();
        
        function updateSongDisplay() {
            const songText = `Canción ${currentSongIndex + 1} de ${songs.length}`;
            const currentSongEl = document.getElementById('current-song');
            const nowPlayingMini = document.getElementById('now-playing-mini');
            if (currentSongEl) currentSongEl.textContent = songText;
            if (nowPlayingMini) nowPlayingMini.textContent = songText;
        }
        
        function loadSong(index) {
            if (audio.src !== songs[index]) {
                audio.src = songs[index];
                audio.load();
            }
            updateSongDisplay();
        }
        
        function playMusic() {
            if (!audioInicializado) {
                audioInicializado = true;
                // Cambiar el indicador después del primer toque
                document.getElementById('zoom-indicator').textContent = '⭐ LAS ESTRELLAS SON TUS FOTOS - HAZ ZOOM ⭐';
            }
            audio.play()
                .then(() => {
                    isPlaying = true;
                    document.getElementById('play-pause').textContent = '⏸';
                    document.getElementById('play-pause-mini').textContent = '⏸';
                })
                .catch(e => console.log('Error al reproducir:', e));
        }
        
        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                document.getElementById('play-pause').textContent = '▶';
                document.getElementById('play-pause-mini').textContent = '▶';
            } else {
                playMusic();
            }
            isPlaying = !isPlaying;
        }
        
        // Event listeners del reproductor
        function setupMusicControls() {
            document.getElementById('play-pause').addEventListener('click', (e) => {
                e.stopPropagation();
                togglePlay();
            });
            
            document.getElementById('play-pause-mini').addEventListener('click', (e) => {
                e.stopPropagation();
                togglePlay();
            });
            
            document.getElementById('next-song').addEventListener('click', (e) => {
                e.stopPropagation();
                currentSongIndex = (currentSongIndex + 1) % songs.length;
                loadSong(currentSongIndex);
                if (isPlaying) playMusic();
            });
            
            document.getElementById('next-song-mini').addEventListener('click', (e) => {
                e.stopPropagation();
                currentSongIndex = (currentSongIndex + 1) % songs.length;
                loadSong(currentSongIndex);
                if (isPlaying) playMusic();
            });
            
            document.getElementById('prev-song').addEventListener('click', (e) => {
                e.stopPropagation();
                currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
                loadSong(currentSongIndex);
                if (isPlaying) playMusic();
            });
            
            document.getElementById('prev-song-mini').addEventListener('click', (e) => {
                e.stopPropagation();
                currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
                loadSong(currentSongIndex);
                if (isPlaying) playMusic();
            });
            
            document.getElementById('progress-bar').addEventListener('click', (e) => {
                e.stopPropagation();
                const rect = e.target.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const width = rect.width;
                const percentage = Math.max(0, Math.min(1, x / width));
                audio.currentTime = percentage * audio.duration;
            });
            
            document.getElementById('volume-slider').addEventListener('click', (e) => {
                e.stopPropagation();
                const rect = e.target.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const width = rect.width;
                const percentage = Math.max(0, Math.min(1, x / width));
                audio.volume = percentage;
                document.getElementById('volume-bar').style.width = (percentage * 100) + '%';
            });
        }
        
        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const progress = (audio.currentTime / audio.duration) * 100;
                document.getElementById('progress-fill').style.width = progress + '%';
                document.getElementById('current-time').textContent = formatTime(audio.currentTime);
                document.getElementById('total-time').textContent = formatTime(audio.duration);
            }
        });
        
        audio.addEventListener('ended', () => {
            currentSongIndex = (currentSongIndex + 1) % songs.length;
            loadSong(currentSongIndex);
            if (isPlaying) playMusic();
        });
        
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
        
        // ===== FUNCIÓN PARA INICIAR TODO CON EL PRIMER TOQUE =====
        function iniciarExperiencia() {
            // Quitar loader
            loader.classList.add('hidden');
            
            // Iniciar música SOLO una vez
            if (!audioInicializado) {
                playMusic();
            }
            
            // Cambiar el indicador
            document.getElementById('zoom-indicator').textContent = '⭐ LAS ESTRELLAS SON TUS FOTOS - HAZ ZOOM ⭐';
            
            // Remover listeners después del primer toque
            document.removeEventListener('touchstart', iniciarExperiencia);
            document.removeEventListener('click', iniciarExperiencia);
        }
        
        // Esperar primer interacción del usuario
        document.addEventListener('touchstart', iniciarExperiencia, { once: true });
        document.addEventListener('click', iniciarExperiencia, { once: true });
        
        // ===== CONFIGURACIÓN 3D OPTIMIZADA =====
        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            
            // Cámara
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, isMobile ? 24 : 22);
            
            // Renderer optimizado
            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: false,
                powerPreference: "high-performance"
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.5 : 2));
            document.body.appendChild(renderer.domElement);
            
            // Controles
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = isMobile ? 0.25 : 0.3;
            controls.maxDistance = 35;
            controls.minDistance = 5;
            controls.enablePan = false;
            controls.target.set(0, 0, 0);
            
            if (isMobile) {
                controls.touches = {
                    ONE: THREE.TOUCH.ROTATE,
                    TWO: THREE.TOUCH.DOLLY_PAN
                };
            }
            
            // Luces (menos cantidad para mejor rendimiento)
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            
            // Solo 3 luces puntuales
            const lightPositions = [
                [6, 4, 6, 0xff4da6],
                [-6, -3, 6, 0x4da6ff],
                [4, 5, -6, 0xaa88ff]
            ];
            
            lightPositions.forEach(([x, y, z, color]) => {
                const light = new THREE.PointLight(color, 0.6, 30);
                light.position.set(x, y, z);
                scene.add(light);
            });
            
            // Crear partículas (menos en móvil)
            createParticles(isMobile ? 2500 : 4000);
            createStars(1000);
            
            // Configurar controles de música
            setupMusicControls();
            
            // Generar todos los objetos de forma diferida
            generateAllObjects();
            
            // Iniciar animación
            animate();
        }
        
        function createParticles(count) {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const color = new THREE.Color();
            
            for (let i = 0; i < count; i++) {
                const r = 12 + Math.random() * 10;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                
                positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta) * 0.5;
                positions[i*3+2] = r * Math.cos(phi);
                
                color.setHSL(0.7 + Math.random() * 0.4, 0.8, 0.5 + Math.random() * 0.3);
                colors[i*3] = color.r;
                colors[i*3+1] = color.g;
                colors[i*3+2] = color.b;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const material = new THREE.PointsMaterial({
                size: 0.1,
                vertexColors: true,
                blending: THREE.AdditiveBlending,
                transparent: true,
                depthWrite: false,
                sizeAttenuation: true
            });
            
            particles = new THREE.Points(geometry, material);
            scene.add(particles);
            recursoCargado();
        }
        
        function createStars(count) {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            
            for (let i = 0; i < count; i++) {
                const r = 20 + Math.random() * 15;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                positions[i*3+2] = r * Math.cos(phi);
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ 
                color: 0xffffff, 
                size: 0.05, 
                blending: THREE.AdditiveBlending,
                sizeAttenuation: true
            });
            stars = new THREE.Points(geometry, material);
            scene.add(stars);
            recursoCargado();
        }
        
        // ===== FUNCIÓN PARA GENERAR POSICIONES (OPTIMIZADA) =====
        function generarPosiciones(cantidad, radioMin, radioMax, excluir = []) {
            const posiciones = [];
            const intentosMax = 300; // Reducido para mejor rendimiento
            
            for (let i = 0; i < cantidad; i++) {
                let intentos = 0;
                let valida = false;
                let nuevaPos;
                
                while (!valida && intentos < intentosMax) {
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);
                    const r = radioMin + Math.random() * (radioMax - radioMin);
                    
                    nuevaPos = [
                        r * Math.sin(phi) * Math.cos(theta),
                        r * Math.sin(phi) * Math.sin(theta) * 0.6,
                        r * Math.cos(phi)
                    ];
                    
                    valida = true;
                    // Solo verificar contra las primeras 15 posiciones
                    const maxCheck = Math.min(posiciones.length, 15);
                    for (let j = 0; j < maxCheck; j++) {
                        const dx = nuevaPos[0] - posiciones[j][0];
                        const dy = nuevaPos[1] - posiciones[j][1];
                        const dz = nuevaPos[2] - posiciones[j][2];
                        if (dx*dx + dy*dy + dz*dz < 10) { // distancia ~3.16
                            valida = false;
                            break;
                        }
                    }
                    intentos++;
                }
                posiciones.push(nuevaPos || [radioMax * (Math.random() - 0.5), 0, 0]);
            }
            return posiciones;
        }
        
        // ===== CREAR TODOS LOS OBJETOS (CARGA DIFERIDA) =====
        function generateAllObjects() {
            // 1. Posiciones base
            const posNeb = generarPosiciones(11, 6, 9);
            const posNebArray = posNeb.map(p => [p[0], p[1], p[2]]);
            
            // 2. Crear nebulosas (en batches)
            setTimeout(() => createNebulosas(posNeb), 100);
            
            // 3. Posiciones para estrellas
            setTimeout(() => {
                const posEstrellas = generarPosiciones(14, 8, 12, posNebArray);
                createEstrellasMagicas(posEstrellas);
            }, 300);
            
            // 4. Posiciones para videos
            setTimeout(() => {
                const posEstrellas = generarPosiciones(14, 8, 12, posNebArray);
                const posVideos = generarPosiciones(6, 9, 13, [...posNebArray, ...posEstrellas]);
                createVideos(posVideos);
            }, 500);
        }
        
        // Nebulosas
        function createNebulosas(posiciones) {
            const textos = [
                '✨ Gracias por todas las sonrisas. Espero que tengas un lindo cumpleaños ✨',
                '💫 Que la vida te mime tanto como tú mereces 💫',
                '❤️ Tu risa es lo que más extraño ❤️',
                '🌌 Eres mi persona favorita en el universo 🌌',
                'No te alejes por favor.'
            ];
            
            const imagenesNebulosas = [
                { archivo: 'foto1.JPEG', texto: 'Nuestra primera salida de pareja' },
                { archivo: 'foto2.jpg', texto: '¡Feliz día!' },
                { archivo: 'foto3.jpg', texto: 'Brilla hoy como nunca, es tu día' },
                { archivo: 'foto4.jpg', texto: 'Que nunca te falten ganas de vivir, de reír y de seguir siendo tú. ¡Feliz cumpleaños!' },
                { archivo: 'foto5.jpg', texto: 'Feliz cumpleaños sinceramente, deseo con todo mi corazón que tu vida siga floreciendo y sigas avanzando. Recuerda que siempre estaré a tu lado. ¡Felicidades!' },
                { archivo: 'foto6.jpg', texto: 'Deseo que a pesar del paso de los años continúes teniendo esa alegría, encanto y bondad que te caracterizan.' }
            ];
            
            const colores = [
                0xff66b2, 0x66b2ff, 0xcc66ff, 0xffaa88, 0xff66cc,
                0xffaa88, 0x88aaff, 0xff88aa, 0xff66cc, 0xff66cc, 0xff66cc
            ];
            
            // Textos (primeras 5)
            for (let i = 0; i < 5; i++) {
                if (!posiciones[i]) continue;
                const pos = posiciones[i];
                const geometry = new THREE.SphereGeometry(0.65, 24, 24); // Menos segmentos
                const material = new THREE.MeshStandardMaterial({
                    color: colores[i],
                    emissive: colores[i],
                    emissiveIntensity: 0.4,
                    roughness: 0.3
                });
                
                const esfera = new THREE.Mesh(geometry, material);
                esfera.position.set(pos[0], pos[1], pos[2]);
                esfera.userData = { tipo: 'texto', contenido: textos[i] };
                
                scene.add(esfera);
                esferas.push(esfera);
                
                const light = new THREE.PointLight(colores[i], 0.4, 5);
                light.position.set(pos[0], pos[1], pos[2]);
                scene.add(light);
                recursoCargado();
            }
            
            // Imágenes (siguientes 6)
            for (let i = 0; i < 6; i++) {
                if (!posiciones[i + 5]) continue;
                const pos = posiciones[i + 5];
                const geometry = new THREE.SphereGeometry(0.65, 24, 24);
                const material = new THREE.MeshStandardMaterial({
                    color: colores[i + 5],
                    emissive: colores[i + 5],
                    emissiveIntensity: 0.4,
                    roughness: 0.3
                });
                
                const esfera = new THREE.Mesh(geometry, material);
                esfera.position.set(pos[0], pos[1], pos[2]);
                esfera.userData = {
                    tipo: 'imagen',
                    contenido: imagenesNebulosas[i].archivo,
                    textoAlternativo: imagenesNebulosas[i].texto
                };
                
                scene.add(esfera);
                esferas.push(esfera);
                
                const light = new THREE.PointLight(colores[i + 5], 0.4, 5);
                light.position.set(pos[0], pos[1], pos[2]);
                scene.add(light);
                recursoCargado();
            }
        }
        
        // Estrellas mágicas
        function createEstrellasMagicas(posiciones) {
            const archivos = [
                'foto7.jpg', 'foto8.jpg', 'foto9.jpg', 'foto10.jpg',
                'foto11.jpg', 'foto12.jpg', 'foto13.jpg', 'foto14.jpg',
                'foto15.jpg', 'foto16.jpg', 'foto17.jpg', 'foto18.jpg',
                'foto19.jpg', 'foto20.jpg'
            ];
            
            const textureLoader = new THREE.TextureLoader();
            
            archivos.forEach((archivo, index) => {
                if (!posiciones[index]) return;
                
                textureLoader.load(
                    archivo,
                    (texture) => {
                        const material = new THREE.SpriteMaterial({ 
                            map: texture,
                            blending: THREE.NormalBlending,
                            sizeAttenuation: true
                        });
                        const sprite = new THREE.Sprite(material);
                        const pos = posiciones[index];
                        sprite.position.set(pos[0], pos[1], pos[2]);
                        sprite.scale.set(2.2, 2.2, 1);
                        scene.add(sprite);
                        recursoCargado();
                    },
                    undefined,
                    () => recursoCargado() // Contar como cargado aunque falle
                );
            });
        }
        
        // Videos
        function createVideos(posiciones) {
            const videosInfo = [
                { archivo: 'video1.MP4', texto: '🎬 El universo está de fiesta.', color: 0xffaa66 },
                { archivo: 'video2.mp4', texto: '🎬 Doy gracias cada día por haberte conocido y pido perdon por haberte fallado.', color: 0xff66cc },
                { archivo: 'video3.mp4', texto: '🎬 Tal vez no pueda estar a tu lado en este momento pero espero algun día poder estarlo, felicidades y espero que sea un dia maravilloso para ti.', color: 0x66ffcc },
                { archivo: 'video4.mp4', texto: '🎬 Te pienso en tu día', color: 0xcc66ff },
                { archivo: 'video5.mp4', texto: '🎬 No dejes de brillar', color: 0xffaa88 },
                { archivo: 'video6.mp4', texto: '🎬 Tu luz interior', color: 0x88aaff }
            ];
            
            videosInfo.forEach((video, index) => {
                if (!posiciones[index]) return;
                
                const geometry = new THREE.SphereGeometry(0.7, 16, 16); // Menos segmentos
                const material = new THREE.MeshStandardMaterial({
                    color: video.color,
                    emissive: video.color,
                    emissiveIntensity: 0.4
                });
                
                const esfera = new THREE.Mesh(geometry, material);
                const pos = posiciones[index];
                esfera.position.set(pos[0], pos[1], pos[2]);
                
                esfera.userData = {
                    tipo: 'video',
                    archivo: video.archivo,
                    texto: video.texto,
                    esMagico: true
                };
                
                scene.add(esfera);
                objetosMagicos.push(esfera);
                
                const light = new THREE.PointLight(video.color, 0.4, 5);
                light.position.set(pos[0], pos[1], pos[2]);
                scene.add(light);
                recursoCargado();
            });
        }
        
        // ===== RAYCASTER OPTIMIZADO =====
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let clickTimeout = null;
        
        function detenerVideoActual() {
            if (videoActual) {
                videoActual.pause();
                videoActual.currentTime = 0;
                videoActual = null;
            }
        }
        window.detenerVideoActual = detenerVideoActual;
        
        function handleInteraction(event) {
            event.preventDefault();
            
            // Evitar múltiples clics rápidos
            if (clickTimeout) return;
            clickTimeout = setTimeout(() => { clickTimeout = null; }, 300);
            
            const rect = renderer.domElement.getBoundingClientRect();
            const clientX = event.touches ? event.touches[0].clientX : event.clientX;
            const clientY = event.touches ? event.touches[0].clientY : event.clientY;
            
            mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            
            // Optimización: solo revisar objetos cercanos
            const objetosCercanos = [...esferas, ...objetosMagicos].filter(obj => {
                const dist = obj.position.distanceTo(camera.position);
                return dist < 15;
            });
            
            const intersects = raycaster.intersectObjects(objetosCercanos);
            
            if (intersects.length > 0) {
                const objeto = intersects[0].object;
                const datos = objeto.userData;
                const mensajeDiv = document.getElementById('mensaje');
                
                detenerVideoActual();
                
                let contenidoHTML = '<div id="cerrar-mensaje" onclick="document.getElementById(\'mensaje\').classList.remove(\'visible\'); detenerVideoActual();">✕</div>';
                
                if (datos.tipo === 'video' && datos.esMagico) {
                    contenidoHTML += `<p style="margin:0 0 10px;">🎬</p>`;
                    contenidoHTML += `<p style="margin:5px 0 15px;">${datos.texto}</p>`;
                    contenidoHTML += `<video id="video-reproduccion" muted controls playsinline style="width:100%; border-radius:15px;" src="${datos.archivo}"></video>`;
                } 
                else if (datos.tipo === 'texto') {
                    contenidoHTML += `<p style="margin:0; font-style:italic;">💬</p><p style="margin:15px 0 0;">${datos.contenido}</p>`;
                } 
                else if (datos.tipo === 'imagen') {
                    contenidoHTML += `<p style="margin-bottom:15px;">${datos.textoAlternativo}</p>`;
                    contenidoHTML += `<img src="${datos.contenido}" alt="${datos.textoAlternativo}" style="max-width:100%; border-radius:15px;">`;
                }
                
                mensajeDiv.innerHTML = contenidoHTML;
                mensajeDiv.classList.add('visible');
                
                if (datos.tipo === 'video' && datos.esMagico) {
                    setTimeout(() => {
                        videoActual = document.getElementById('video-reproduccion');
                    }, 100);
                }
                
                // Feedback visual
                if (objeto.material.emissiveIntensity !== undefined) {
                    objeto.material.emissiveIntensity = 1.2;
                    setTimeout(() => {
                        if (objeto.material.emissiveIntensity !== undefined) {
                            objeto.material.emissiveIntensity = 0.4;
                        }
                    }, 300);
                }
            }
        }
        
        // ===== MINIMIZAR/EXPANDIR REPRODUCTOR =====
        const musicPlayer = document.getElementById('music-player');
        const toggleBtn = document.getElementById('toggle-player');
        let isMinimized = false;
        
        toggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            isMinimized = !isMinimized;
            musicPlayer.classList.toggle('minimized', isMinimized);
            toggleBtn.textContent = isMinimized ? '⬆️' : '🔽';
        });
        
        // ===== ANIMACIÓN =====
        function animate() {
            requestAnimationFrame(animate);
            
            if (particles) particles.rotation.y += 0.0001;
            if (stars) stars.rotation.y -= 0.00005;
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        // ===== RESIZE =====
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // ===== INICIAR TODO =====
        initScene();
        
        // Event listeners para clics (optimizados)
        renderer.domElement.addEventListener('click', handleInteraction);
        renderer.domElement.addEventListener('touchstart', handleInteraction, { passive: false });
    </script>
