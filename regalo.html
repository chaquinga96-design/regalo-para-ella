<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebulosa de los Recuerdos ✨</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 30px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 14px;
        }
        #mensaje {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 5, 30, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            padding: 25px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 192, 203, 0.6);
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.5);
            text-align: center;
            min-width: 300px;
            max-width: 80%;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
            font-size: 1.2rem;
            line-height: 1.6;
            border-left: 5px solid hotpink;
            pointer-events: auto;
        }
        #mensaje.visible {
            opacity: 1;
        }
        #mensaje img {
            max-width: 300px;
            max-height: 300px;
            border-radius: 15px;
            margin-top: 10px;
            border: 3px solid white;
            cursor: pointer;
        }
        #mensaje video {
            max-width: 300px;
            max-height: 300px;
            border-radius: 15px;
            margin-top: 10px;
            border: 3px solid white;
            background: black;
            cursor: pointer;
        }
        #cerrar-mensaje {
            position: absolute;
            top: 10px;
            right: 15px;
            color: white;
            font-size: 24px;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            z-index: 1001;
        }
        #cerrar-mensaje:hover {
            background: rgba(255,255,255,0.4);
        }
        .subtitulo {
            position: absolute;
            bottom: 10px;
            right: 20px;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            z-index: 10;
        }
        #zoom-indicator {
            position: absolute;
            bottom: 80px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 10;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,215,0,0.5);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div id="info">✨ Nebulosa de los Recuerdos | Para ti ✨</div>
    <div id="zoom-indicator">⭐ LAS ESTRELLAS SON TUS FOTOS - HAZ ZOOM ⭐</div>
    <div id="mensaje"></div>
    <div class="subtitulo">Con todo mi cariño 💫</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // --- CONFIGURACIÓN INICIAL ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 20);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.0; // Exposición normal
        document.body.appendChild(renderer.domElement);
        
        // --- CONTROLES ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.4;
        controls.enableZoom = true;
        controls.maxDistance = 35;
        controls.minDistance = 4;
        controls.enablePan = false;
        controls.target.set(0, 0, 0);
        
        // --- LUCES (MUY SUTILES para no afectar las imágenes) ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        // Luces muy tenues para crear ambiente sin sobreexponer
        const light1 = new THREE.PointLight(0xff4da6, 0.3, 30);
        light1.position.set(5, 3, 5);
        scene.add(light1);
        
        const light2 = new THREE.PointLight(0x4da6ff, 0.3, 30);
        light2.position.set(-5, -2, 5);
        scene.add(light2);
        
        const light3 = new THREE.PointLight(0xaa88ff, 0.3, 30);
        light3.position.set(3, 4, -5);
        scene.add(light3);
        
        // --- PARTÍCULAS DE FONDO (nebulosa) ---
        const particleCount = 4000;
        const particlesGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        
        const color = new THREE.Color();
        
        for (let i = 0; i < particleCount; i++) {
            const radius = 10 + Math.random() * 8;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            
            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.sin(phi) * Math.sin(theta) * 0.5;
            const z = radius * Math.cos(phi);
            
            positions[i*3] = x;
            positions[i*3+1] = y;
            positions[i*3+2] = z;
            
            const hue = 0.7 + Math.random() * 0.4;
            color.setHSL(hue % 1.0, 0.8, 0.5 + Math.random() * 0.3);
            
            colors[i*3] = color.r;
            colors[i*3+1] = color.g;
            colors[i*3+2] = color.b;
        }
        
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particlesGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        
        const particlesMat = new THREE.PointsMaterial({
            size: 0.1,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            transparent: true,
            depthWrite: false,
            sizeAttenuation: true
        });
        
        const particles = new THREE.Points(particlesGeo, particlesMat);
        scene.add(particles);
        
        // Estrellas de fondo (blancas)
        const starsGeo = new THREE.BufferGeometry();
        const starsPos = new Float32Array(1000 * 3);
        for (let i = 0; i < 1000; i++) {
            const r = 18 + Math.random() * 12;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            starsPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
            starsPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            starsPos[i*3+2] = r * Math.cos(phi);
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
        const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.04, sizeAttenuation: true, blending: THREE.AdditiveBlending });
        const stars = new THREE.Points(starsGeo, starsMat);
        scene.add(stars);
        
        // ===== NEBULOSAS (textos y fotos con clic) REORGANIZADAS =====
        // Distribuidas en un radio de 5-7 unidades con separación clara
        
        const recuerdos = [
            // Textos - en posiciones bien separadas
            { 
                tipo: 'texto', 
                contenido: '✨ Gracias por todas las sonrisas. Espero que tengas un lindo cumpleaños ✨', 
                posicion: [5.5, 2.5, 3.0], 
                color: 0xff66b2 
            },
            { 
                tipo: 'texto', 
                contenido: '💫 Que la vida te mime tanto como tú mereces 💫', 
                posicion: [-5.0, -2.0, 4.5], 
                color: 0x66b2ff 
            },
            { 
                tipo: 'texto', 
                contenido: '❤️ Tu risa es lo que más extraño ❤️', 
                posicion: [2.5, 3.5, -4.0], 
                color: 0xcc66ff 
            },
            { 
                tipo: 'texto', 
                contenido: '🌌 Eres mi persona favorita en el universo 🌌', 
                posicion: [-4.0, -3.0, -4.0], 
                color: 0xffaa88 
            },
            { 
                tipo: 'texto', 
                contenido: 'No te alejes por favor.', 
                posicion: [4.0, -1.5, -5.0], 
                color: 0xff66cc 
            },
            // Imágenes (fotos con clic)
            { 
                tipo: 'imagen', 
                contenido: 'foto1.JPEG', 
                textoAlternativo: 'Nuestra primera salida de pareja',
                posicion: [6.0, -1.2, -3.0], 
                color: 0xffaa88 
            },
            { 
                tipo: 'imagen', 
                contenido: 'foto2.jpg',
                textoAlternativo: '¡Feliz día!',
                posicion: [-5.5, 2.8, 2.5], 
                color: 0x88aaff 
            },
            { 
                tipo: 'imagen', 
                contenido: 'foto3.jpg',
                textoAlternativo: 'Brilla hoy como nunca, es tu día',
                posicion: [3.2, -3.0, 5.0], 
                color: 0xff88aa 
            },
            { 
                tipo: 'imagen', 
                contenido: 'foto4.jpg',
                textoAlternativo: 'Que nunca te falten ganas de vivir, de reír y de seguir siendo tú. ¡Feliz cumpleaños!',
                posicion: [-3.0, 4.0, -4.8],
                color: 0xff66cc 
            },
            { 
                tipo: 'imagen', 
                contenido: 'foto5.jpg',
                textoAlternativo: 'Feliz cumpleaños sinceramente, deseo con todo mi corazón que tu vida siga floreciendo y sigas avanzando. Recuerda que siempre estaré a tu lado. ¡Felicidades!',
                posicion: [4.5, -3.2, -4.0],
                color: 0xff66cc 
            },
            { 
                tipo: 'imagen', 
                contenido: 'foto6.jpg',
                textoAlternativo: 'Deseo que a pesar del paso de los años continúes teniendo esa alegría, encanto y bondad que te caracterizan.',
                posicion: [-6.2, 2.0, 4.2],
                color: 0xff66cc 
            }
        ];
        
        const esferas = [];
        
        recuerdos.forEach((data) => {
            const geometry = new THREE.SphereGeometry(0.6, 32, 32);
            
            const material = new THREE.MeshStandardMaterial({
                color: data.color,
                emissive: data.color,
                emissiveIntensity: 0.3, // Brillo reducido
                roughness: 0.4,
                metalness: 0.1
            });
            
            const esfera = new THREE.Mesh(geometry, material);
            esfera.position.set(data.posicion[0], data.posicion[1], data.posicion[2]);
            
            esfera.userData = {
                tipo: data.tipo,
                contenido: data.contenido,
                textoAlternativo: data.textoAlternativo || ''
            };
            
            scene.add(esfera);
            esferas.push(esfera);
            
            // Luces muy sutiles alrededor de las nebulosas
            const pointLight = new THREE.PointLight(data.color, 0.4, 6);
            pointLight.position.set(data.posicion[0], data.posicion[1], data.posicion[2]);
            scene.add(pointLight);
        });
        
        // ===== ESTRELLAS MÁGICAS CON IMÁGENES REALES (SIN NINGÚN BRILLO) =====
        // Distribuidas en un radio más amplio (7-9 unidades)
        
        const estrellasMagicas = [
            { archivo: 'foto7.jpg', posicion: [8.0, 3.5, 5.5] },
            { archivo: 'foto8.jpg', posicion: [-7.5, -3.0, 6.0] },
            { archivo: 'foto9.jpg', posicion: [6.5, 5.0, -5.5] },
            { archivo: 'foto10.jpg', posicion: [-6.0, -4.5, 7.0] },
            { archivo: 'foto11.jpg', posicion: [7.0, -3.5, -6.5] },
            { archivo: 'foto12.jpg', posicion: [-5.5, 5.5, 5.0] },
            { archivo: 'foto13.jpg', posicion: [5.0, -5.0, 6.5] },
            { archivo: 'foto14.jpg', posicion: [-7.0, 4.0, -6.0] },
            { archivo: 'foto15.jpg', posicion: [6.2, -2.5, -7.0] },
            { archivo: 'foto16.jpg', posicion: [-4.8, 6.0, 4.5] },
            { archivo: 'foto17.jpg', posicion: [7.5, 3.8, -5.0] },
            { archivo: 'foto18.jpg', posicion: [-4.5, -5.2, 6.8] },
            { archivo: 'foto19.jpg', posicion: [5.8, 5.2, -5.8] },
            { archivo: 'foto20.jpg', posicion: [-7.2, -2.5, 5.5] }
        ];
        
        const textureLoader = new THREE.TextureLoader();
        
        estrellasMagicas.forEach((estrella) => {
            textureLoader.load(
                estrella.archivo,
                (texture) => {
                    // IMPORTANTE: Configuración para imagen PERFECTA sin alteraciones
                    texture.minFilter = THREE.LinearFilter;
                    texture.magFilter = THREE.LinearFilter;
                    
                    const material = new THREE.SpriteMaterial({ 
                        map: texture,
                        transparent: false,
                        blending: THREE.NormalBlending, // Modo normal, sin mezclas
                        depthTest: true,
                        depthWrite: true,
                        sizeAttenuation: true,
                        color: 0xffffff, // Color blanco puro para no alterar la imagen
                        opacity: 1.0
                    });
                    
                    const sprite = new THREE.Sprite(material);
                    sprite.position.set(
                        estrella.posicion[0], 
                        estrella.posicion[1], 
                        estrella.posicion[2]
                    );
                    
                    sprite.scale.set(2.5, 2.5, 1);
                    
                    scene.add(sprite);
                    console.log(`✅ Imagen cargada: ${estrella.archivo}`);
                },
                undefined,
                (err) => {
                    console.warn(`❌ Error cargando: ${estrella.archivo}`);
                }
            );
        });
        
        // ===== VIDEOS (con control de audio al cerrar) =====
        const estrellasVideo = [
            { archivo: 'video1.mp4', texto: '🎬 Nuestro video especial 1', color: 0xffaa66, posicion: [7.0, -4.8, -5.5] },
            { archivo: 'video2.mp4', texto: '🎬 Video especial 2', color: 0xff66cc, posicion: [-6.8, 5.2, -5.0] },
            { archivo: 'video3.mp4', texto: '🎬 El universo está de fiesta', color: 0x66ffcc, posicion: [5.2, -5.5, 6.0] },
            { archivo: 'video4.mp4', texto: '🎬 Te pienso en tu día', color: 0xcc66ff, posicion: [-6.0, 5.8, 4.5] },
            { archivo: 'video5.mp4', texto: '🎬 No dejes de brillar', color: 0xffaa88, posicion: [7.2, 4.0, -6.0] },
            { archivo: 'video6.mp4', texto: '🎬 Tu luz interior', color: 0x88aaff, posicion: [-6.2, -5.0, 6.2] }
        ];
        
        const objetosMagicos = [];
        
        estrellasVideo.forEach((video) => {
            const geometry = new THREE.SphereGeometry(0.6, 24, 24);
            const material = new THREE.MeshStandardMaterial({
                color: video.color,
                emissive: video.color,
                emissiveIntensity: 0.4,
                roughness: 0.3,
                metalness: 0.1
            });
            const esferaVideo = new THREE.Mesh(geometry, material);
            esferaVideo.position.set(video.posicion[0], video.posicion[1], video.posicion[2]);
            
            esferaVideo.userData = {
                tipo: 'video',
                archivo: video.archivo,
                texto: video.texto,
                esMagico: true
            };
            
            scene.add(esferaVideo);
            objetosMagicos.push(esferaVideo);
            
            const pointLight = new THREE.PointLight(video.color, 0.5, 6);
            pointLight.position.set(video.posicion[0], video.posicion[1], video.posicion[2]);
            scene.add(pointLight);
        });
        
        // --- RAYCASTER PARA CLICS (CON CONTROL DE VIDEO) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let videoActual = null; // Para controlar el video que se está reproduciendo
        
        function detenerVideoActual() {
            if (videoActual) {
                videoActual.pause();
                videoActual.currentTime = 0;
                videoActual = null;
            }
        }
        
        function onClick(event) {
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            
            const todosLosObjetosClickeables = [...esferas, ...objetosMagicos];
            const intersects = raycaster.intersectObjects(todosLosObjetosClickeables);
            
            if (intersects.length > 0) {
                const objeto = intersects[0].object;
                const datos = objeto.userData;
                const mensajeDiv = document.getElementById('mensaje');
                
                // Detener cualquier video que se esté reproduciendo
                detenerVideoActual();
                
                let contenidoHTML = '';
                contenidoHTML += '<div id="cerrar-mensaje" onclick="document.getElementById(\'mensaje\').classList.remove(\'visible\'); detenerVideoActual();">✕</div>';
                
                if (datos.tipo === 'video' && datos.esMagico) {
                    contenidoHTML += `<p style="margin:0; font-style:italic; margin-bottom:10px;">🎬</p>`;
                    contenidoHTML += `<p style="margin:5px 0 15px;">${datos.texto}</p>`;
                    contenidoHTML += `<video id="video-reproduccion" controls style="width:100%; max-width:300px; border-radius:15px; margin-top:10px;" src="${datos.archivo}"></video>`;
                } 
                else if (datos.tipo === 'texto') {
                    contenidoHTML += `<p style="margin:0; font-style:italic;">💬</p><p style="margin:15px 0 0;">${datos.contenido}</p>`;
                } 
                else if (datos.tipo === 'imagen') {
                    contenidoHTML += `<p style="margin-bottom:15px;">${datos.textoAlternativo}</p>`;
                    contenidoHTML += `<img src="${datos.contenido}" alt="${datos.textoAlternativo}" style="max-width:300px; max-height:300px; border-radius:15px; border:3px solid white;">`;
                }
                
                mensajeDiv.innerHTML = contenidoHTML;
                mensajeDiv.classList.add('visible');
                
                // Si es video, guardar referencia y asegurar que se detenga al cerrar
                if (datos.tipo === 'video' && datos.esMagico) {
                    setTimeout(() => {
                        videoActual = document.getElementById('video-reproduccion');
                    }, 100);
                }
                
                // Efecto visual en la esfera clickeada
                if (objeto.material.emissiveIntensity !== undefined) {
                    objeto.material.emissiveIntensity = 1.0;
                    setTimeout(() => {
                        if (objeto.material.emissiveIntensity !== undefined) {
                            objeto.material.emissiveIntensity = datos.tipo === 'video' ? 0.4 : 0.3;
                        }
                    }, 300);
                }
            }
        }
        
        window.addEventListener('click', onClick);
        
        // Hacer accesible la función para el botón de cerrar
        window.detenerVideoActual = detenerVideoActual;
        
        // --- ANIMACIÓN ---
        function animate() {
            requestAnimationFrame(animate);
            
            particles.rotation.y += 0.0001;
            stars.rotation.y -= 0.00005;
            
            controls.update();
            renderer.render(scene, camera); // Sin postprocesado para mantener colores puros
        }
        
        animate();
        
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
